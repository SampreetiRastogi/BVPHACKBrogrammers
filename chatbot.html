<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saarthi Travel Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            min-height: 100vh;
        }
        
        /* Floating Chat Icon */
        #chatbot-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            transition: transform 0.3s ease;
        }
        
        #chatbot-icon:hover {
            transform: scale(1.05);
        }
        
        #chatbot-icon i {
            color: white;
            font-size: 24px;
        }
        
        /* Chat Container */
        #chatbot-container {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 350px;
            height: 500px;
            background-color: white;
            border-radius: 18px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
        }
        
        #chatbot-container.active {
            transform: translateY(0);
            opacity: 1;
            pointer-events: all;
        }
        
        /* Header */
        #chatbot-header {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        #chatbot-header span {
            font-weight: 600;
            font-size: 16px;
        }
        
        #chatbot-toggle {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        
        /* Messages Area */
        #chatbot-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #f5f7fa;
        }
        
        .message {
            display: flex;
            max-width: 80%;
        }
        
        .message.bot {
            align-self: flex-start;
        }
        
        .message.user {
            align-self: flex-end;
        }
        
        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            line-height: 1.5;
            font-size: 14px;
        }
        
        .message.bot .bubble {
            background-color: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        .message.user .bubble {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-time {
            font-size: 10px;
            margin-top: 5px;
            opacity: 0.7;
            text-align: right;
        }
        
        /* Input Area */
        #chatbot-input {
            padding: 15px;
            background-color: white;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }
        
        #userInput {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        #userInput:focus {
            border-color: #6a11cb;
        }
        
        #mic-button, #send-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }
        
        #mic-button:hover, #send-button:hover {
            transform: scale(1.05);
        }
        
        /* Quick Suggestions */
        #quick-suggestions {
            padding: 10px 15px;
            background-color: white;
            border-top: 1px solid #eee;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .suggestion-chip {
            padding: 8px 15px;
            background-color: #f0f4ff;
            border-radius: 18px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .suggestion-chip:hover {
            background-color: #e2e8ff;
        }
        
        /* Typing indicator */
        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background-color: white;
            border-radius: 18px;
            align-self: flex-start;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }
        
        .typing-indicator span {
            height: 8px;
            width: 8px;
            float: left;
            margin: 0 1px;
            background-color: #9E9EA1;
            display: block;
            border-radius: 50%;
            opacity: 0.4;
        }
        
        .typing-indicator span:nth-of-type(1) {
            animation: typing 1s infinite;
        }
        
        .typing-indicator span:nth-of-type(2) {
            animation: typing 1s 0.33s infinite;
        }
        
        .typing-indicator span:nth-of-type(3) {
            animation: typing 1s 0.66s infinite;
        }
        
        @keyframes typing {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            50% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Chat Icon -->
    <div id="chatbot-icon">
        <i class="fas fa-comments"></i>
    </div>

    <!-- Chat Container -->
    <div id="chatbot-container">
        <div id="chatbot-header">
            <span>Saarthi Assistant</span>
            <button id="chatbot-toggle"><i class="fas fa-chevron-down"></i></button>
        </div>
        <div id="chatbot-messages">
            <div class="message bot">
                <div class="bubble">
                    Welcome to Saarthi! I'm your virtual travel assistant. How can I help you with your travel plans today?
                    <div class="message-time" id="welcome-time"></div>
                </div>
            </div>
            <div class="typing-indicator">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <div id="quick-suggestions">
            <div class="suggestion-chip" data-query="Best tourist places">Best tourist places</div>
            <div class="suggestion-chip" data-query="Travel tips">Travel tips</div>
            <div class="suggestion-chip" data-query="Budget travel">Budget travel</div>
            <div class="suggestion-chip" data-query="Local cuisine">Local cuisine</div>
        </div>
        <div id="chatbot-input">
            <input type="text" id="userInput" placeholder="Type your message..." aria-label="Type your message">
            <button id="mic-button" aria-label="Voice input"><i class="fas fa-microphone"></i></button>
            <button id="send-button" aria-label="Send message"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Set welcome message time
            const welcomeTime = document.getElementById('welcome-time');
            const now = new Date();
            welcomeTime.textContent = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
            
            // DOM Elements
            const chatbotIcon = document.getElementById('chatbot-icon');
            const chatbotContainer = document.getElementById('chatbot-container');
            const chatbotToggle = document.getElementById('chatbot-toggle');
            const userInput = document.getElementById('userInput');
            const sendButton = document.getElementById('send-button');
            const micButton = document.getElementById('mic-button');
            const messagesContainer = document.getElementById('chatbot-messages');
            const typingIndicator = document.querySelector('.typing-indicator');
            const suggestionChips = document.querySelectorAll('.suggestion-chip');
            
            // Toggle chatbot visibility
            chatbotIcon.addEventListener('click', function() {
                chatbotContainer.classList.toggle('active');
                chatbotIcon.style.display = 'none';
            });
            
            chatbotToggle.addEventListener('click', function() {
                chatbotContainer.classList.remove('active');
                chatbotIcon.style.display = 'flex';
            });
            
            // Knowledge base for travel-related queries
            const knowledgeBase = {
                greetings: [
                    "Hello! How can I assist with your travel plans today?",
                    "Hi there! Ready to plan your next adventure?",
                    "Greetings! How can I help make your trip memorable?"
                ],
                farewells: [
                    "Safe travels! Don't hesitate to ask if you need more assistance.",
                    "Happy journeys! Remember to capture beautiful memories.",
                    "Have a wonderful trip! Contact me if you need more help."
                ],
                "best tourist places": "Some of the best tourist destinations include Paris for its romance, Bali for beaches, Japan for culture, Switzerland for mountains, and New York for city life. What type of destination are you interested in?",
                "travel tips": "Essential travel tips: 1) Always have travel insurance 2) Keep digital copies of important documents 3) Learn basic local phrases 4) Pack light 5) Stay hydrated during flights 6) Respect local customs",
                "budget travel": "For budget travel: consider off-season visits, use price comparison websites, stay in hostels or Airbnb, eat local food, use public transportation, and look for free walking tours in cities.",
                "local cuisine": "Trying local cuisine is one of the best parts of traveling! I recommend visiting local markets, street food stalls (check hygiene), and family-run restaurants. Always ask locals for their favorite spots!",
                "visa requirements": "Visa requirements vary by your nationality and destination. Always check with the embassy of your destination country at least 2 months before your planned travel date.",
                "packing tips": "Pack versatile clothing items that can be layered. Remember chargers, adapters, medications, and a first-aid kit. Leave space for souvenirs!",
                "safety tips": "Travel safety: Keep valuables in hotel safe, be aware of your surroundings, avoid displaying expensive items, know emergency numbers for your destination, and register with your embassy if recommended.",
                "family travel": "Great family destinations: Orlando for theme parks, Costa Rica for nature, London for history, and Singapore for cleanliness and attractions. Look for family-friendly accommodations with amenities.",
                "solo travel": "Solo travel can be rewarding! Stay in hostels to meet people, inform someone of your itinerary, trust your instincts, and join group tours to socialize. Japan and New Zealand are great for solo travelers.",
                "adventure travel": "For adventure: try New Zealand for bungee jumping, Nepal for trekking, Costa Rica for ziplining, Iceland for glacier hikes, or South Africa for safari experiences.",
                "beach destinations": "Top beach destinations: Maldives for luxury, Thailand for affordability, Hawaii for diversity, Greece for beautiful coastlines, and Australia for the Great Barrier Reef.",
                "cultural experiences": "Immerse in culture: attend local festivals, visit temples and museums, take cooking classes, watch traditional performances, and participate in community-based tourism.",
                "transportation tips": "Use apps like Rome2Rio for route planning. For trains, consider Eurail passes in Europe. Ride-sharing apps are available in many countries. Always agree on taxi fares beforehand.",
                "accommodation": "Consider your needs: hotels for service, hostels for budget and socializing, vacation rentals for space, and boutique hotels for unique experiences. Read recent reviews before booking!",
                "weather considerations": "Check seasonal weather patterns for your destination. Shoulder seasons (spring and fall) often offer the best balance of good weather and fewer crowds.",
                "travel insurance": "Travel insurance is essential! It covers trip cancellations, medical emergencies, lost luggage, and more. Compare policies to find one that suits your needs.",
                "language help": "Learn basic phrases like hello, thank you, and please. Translation apps like Google Translate can be very helpful for menus and signs.",
                "default": "I'm not sure about that specific travel question. Could you please rephrase or ask something else about travel destinations, planning, or tips? I'm here to help with all your travel needs!"
            };
            
            // Function to add message to chat
            function addMessage(text, isUser = false) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
                
                const bubbleDiv = document.createElement('div');
                bubbleDiv.className = 'bubble';
                bubbleDiv.textContent = text;
                
                const timeDiv = document.createElement('div');
                timeDiv.className = 'message-time';
                const now = new Date();
                timeDiv.textContent = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
                
                bubbleDiv.appendChild(timeDiv);
                messageDiv.appendChild(bubbleDiv);
                
                // Insert before typing indicator
                messagesContainer.insertBefore(messageDiv, typingIndicator);
                
                // Scroll to bottom
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                
                return messageDiv;
            }
            
            // Function to show typing indicator
            function showTypingIndicator() {
                typingIndicator.style.display = 'flex';
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
            
            // Function to hide typing indicator
            function hideTypingIndicator() {
                typingIndicator.style.display = 'none';
            }
            
            // Function to generate response
            function generateResponse(query) {
                query = query.toLowerCase().trim();
                
                // Check for greetings
                if (query.includes('hello') || query.includes('hi') || query.includes('hey')) {
                    return knowledgeBase.greetings[Math.floor(Math.random() * knowledgeBase.greetings.length)];
                }
                
                // Check for farewells
                if (query.includes('bye') || query.includes('goodbye') || query.includes('thank')) {
                    return knowledgeBase.farewells[Math.floor(Math.random() * knowledgeBase.farewells.length)];
                }
                
                // Check other queries
                for (const key in knowledgeBase) {
                    if (query.includes(key)) {
                        return knowledgeBase[key];
                    }
                }
                
                return knowledgeBase.default;
            }
            
            // Function to handle user message
            function handleUserMessage() {
                const message = userInput.value.trim();
                if (message === '') return;
                
                // Add user message
                addMessage(message, true);
                userInput.value = '';
                
                // Show typing indicator
                showTypingIndicator();
                
                // Generate and add response after a delay
                setTimeout(() => {
                    hideTypingIndicator();
                    const response = generateResponse(message);
                    addMessage(response);
                }, 1000 + Math.random() * 1000); // Random delay between 1-2 seconds
            }
            
            // Event listeners
            sendButton.addEventListener('click', handleUserMessage);
            
            userInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    handleUserMessage();
                }
            });
            
            micButton.addEventListener('click', function() {
                addMessage("Voice input activated! Please speak now.", true);
                showTypingIndicator();
                
                setTimeout(() => {
                    hideTypingIndicator();
                    addMessage("I'm sorry, voice input is currently being set up. Please type your question for now.");
                }, 1500);
            });
            
            // Add event listeners to suggestion chips
            suggestionChips.forEach(chip => {
                chip.addEventListener('click', function() {
                    const query = this.getAttribute('data-query');
                    userInput.value = query;
                    handleUserMessage();
                });
            });
        });
    </script>
</body>
</html>
